server {
    listen 80;
    server_name localhost;

    # Frontend - Archivos Estáticos
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # API Backend Reverse Proxy
    location /api/ {
        # Reescribe /api/algo a /algo antes de pasarlo al backend
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        
        # Cabeceras estándar de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Soporte para WebSockets y conexiones persistentes
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Soporte específico para SSE (Server-Sent Events) en el Dashboard
    # En desarrollo y producción los SSE requieren desactivar el almacenamiento en búfer de Nginx
    location /api/dashboard/ {
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Desactivar buffering para SSE (crucial para tiempo real)
        proxy_buffering off;
        proxy_cache_off;
        proxy_read_timeout 24h; # Mantener la conexión abierta por tiempo prolongado
        
        # Cabeceras específicas de SSE
        proxy_set_header Connection "";
    }
}
