version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: votaciones_db_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-votaciones}
    ports:
      - "127.0.0.1:5432:5432" # Expuesto solo a localhost para migraciones local o herramientas SQL
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-votaciones}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: votaciones_backend_dev
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/app:/app/app
      - backend_uploads_dev:/app/uploads
    environment:
      - ENVIRONMENT=development

  frontend:
    image: node:22-alpine
    container_name: votaciones_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development

volumes:
  postgres_data_dev:
    driver: local
  backend_uploads_dev:
    driver: local
